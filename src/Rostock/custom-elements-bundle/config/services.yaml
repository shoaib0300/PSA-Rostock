services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        public: true

    Rostock\CustomElementsBundle\:
        resource: ../src
        exclude: ../src/{Classes,ContaoManager,DependencyInjection,Elements,Module,EventListener}

    Rostock\CustomElementsBundle\EventListener\:
        resource: ../src/EventListener

    Rostock\CustomElementsBundle\Classes\PsaMemberFlash:
        autowire: true